services:
  postgres:
    image: postgres:15-alpine
    container_name: market_db_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # postgres сам выполняет .sql отсюда по алфавиту, но ТОЛЬКО когда
      # volume пустой (первый старт на чистом клоне) — ровно то, что
      # нужно новому пользователю: docker compose up -d создаёт схему
      # сам, без ручного psql -f
      - ./sql/init:/docker-entrypoint-initdb.d:ro

  # ─── Airflow demo-слой (портфолио, НЕ путь по умолчанию) ──────────────────
  # Основной способ запуска — run_all.py + cron (см. README). Этот блок
  # поднимается ТОЛЬКО явно: `docker compose --profile airflow up -d`.
  # Отдельная metadata-БД Airflow — намеренно, чтобы не мешать со
  # схемой самого проекта (raw_ads/clean_data/...).
  airflow-postgres:
    image: postgres:15-alpine
    profiles: ["airflow"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data

  airflow-init:
    build: {context: ., dockerfile: airflow/Dockerfile}
    profiles: ["airflow"]
    depends_on:
      - airflow-postgres
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      # для тасков DAG'а, вызывающих наши скрипты: container-to-container
      # адрес нашей БД — не "localhost" (см. .env, там он для запуска с хоста)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
          airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/project

  airflow-webserver:
    build: {context: ., dockerfile: airflow/Dockerfile}
    profiles: ["airflow"]
    depends_on:
      - airflow-init
      - postgres
    environment: *airflow-env
    ports:
      - "8080:8080"
    command: webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/project

  airflow-scheduler:
    build: {context: ., dockerfile: airflow/Dockerfile}
    profiles: ["airflow"]
    depends_on:
      - airflow-init
      - postgres
    environment: *airflow-env
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/project

volumes:
  pgdata:
  airflow_pgdata:
